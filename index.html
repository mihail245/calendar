<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Видео плеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }

        /* === ПЛЕЕР === */
        .player-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: none;
        }
        .player-container.active {
            display: block;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 68px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
        }
        .center-play:focus {
            outline: none;
        }
        .center-play.show {
            opacity: 1;
        }
        .center-play svg {
            width: 36px;
            height: 36px;
            fill: #fff;
            margin-left: 4px;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 16px 14px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .controls.show {
            opacity: 1;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            margin-bottom: 10px;
            transition: height 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        .progress-bar:hover {
            height: 6px;
        }
        .progress-fill {
            height: 100%;
            background: #ff0000;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .controls-bottom {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls-bottom button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
            user-select: none;
        }
        .controls-bottom button:focus {
            outline: none;
        }
        .controls-bottom button:hover {
            color: #ff0000;
        }
        .controls-bottom button:active {
            color: #ff0000;
            transform: scale(0.92);
        }
        .controls-bottom button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            pointer-events: none;
        }
        .time-display {
            color: #fff;
            font-size: 13px;
            font-family: monospace;
            margin: 0 4px;
            min-width: 70px;
            user-select: none;
        }
        .spacer {
            flex: 1;
        }

        .speed-btn {
            background: rgba(255,255,255,0.08) !important;
            padding: 3px 10px !important;
            border-radius: 4px !important;
            font-size: 13px;
            font-weight: 600;
            color: #fff !important;
            min-width: 44px;
            text-align: center;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            user-select: none !important;
        }
        .speed-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ff0000 !important;
        }
        .speed-btn:focus {
            outline: none !important;
        }
        .speed-btn:active {
            transform: scale(0.92);
        }

        .speed-dropdown {
            position: relative;
            display: inline-block;
        }
        .speed-dropdown .dropdown-content {
            display: none;
            position: absolute;
            bottom: 110%;
            right: 0;
            background: rgba(30,30,30,0.95);
            border-radius: 8px;
            min-width: 90px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            backdrop-filter: blur(10px);
            padding: 4px 0;
        }
        .speed-dropdown .dropdown-content.show {
            display: block;
        }
        .speed-dropdown .dropdown-content button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .speed-dropdown .dropdown-content button:focus {
            outline: none;
        }
        .speed-dropdown .dropdown-content button:hover {
            background: #ff0000;
            color: #fff;
        }
        .speed-dropdown .dropdown-content button.active {
            color: #ff0000;
            font-weight: bold;
        }

        .timeline-btn {
            background: rgba(255,255,255,0.08) !important;
            padding: 3px 10px !important;
            border-radius: 4px !important;
            font-size: 13px;
            font-weight: 600;
            color: #fff !important;
            text-align: center;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            user-select: none !important;
        }
        .timeline-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ff0000 !important;
        }
        .timeline-btn:focus {
            outline: none !important;
        }
        .timeline-btn:active {
            transform: scale(0.92);
        }

        .timeline-dropdown {
            position: relative;
            display: inline-block;
        }
        .timeline-dropdown .dropdown-content {
            display: none;
            position: absolute;
            bottom: 110%;
            right: 0;
            background: rgba(30,30,30,0.95);
            border-radius: 8px;
            min-width: 160px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            backdrop-filter: blur(10px);
            padding: 4px 0;
        }
        .timeline-dropdown .dropdown-content.show {
            display: block;
        }
        .timeline-dropdown .dropdown-content button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .timeline-dropdown .dropdown-content button:focus {
            outline: none;
        }
        .timeline-dropdown .dropdown-content button:hover {
            background: #ff0000;
            color: #fff;
        }
        .timeline-dropdown .dropdown-content button .time-label {
            color: #ff0000;
            font-weight: bold;
            margin-right: 8px;
        }

        .close-fs {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .close-fs:focus {
            outline: none;
        }
        .close-fs:hover {
            background: rgba(255,0,0,0.6);
        }
        .close-fs:active {
            transform: scale(0.92);
        }
        .player-container:-webkit-full-screen .close-fs,
        .player-container:-moz-full-screen .close-fs,
        .player-container:fullscreen .close-fs {
            display: block;
        }

        .player-container:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            background: #000 !important;
        }
        .player-container:-moz-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            background: #000 !important;
        }
        .player-container:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            background: #000 !important;
        }

        .player-container:-webkit-full-screen .video-wrapper {
            padding-top: 0 !important;
            height: 100vh !important;
        }
        .player-container:-moz-full-screen .video-wrapper {
            padding-top: 0 !important;
            height: 100vh !important;
        }
        .player-container:fullscreen .video-wrapper {
            padding-top: 0 !important;
            height: 100vh !important;
        }

        .player-container:-webkit-full-screen .video-wrapper video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }
        .player-container:-moz-full-screen .video-wrapper video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }
        .player-container:fullscreen .video-wrapper video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }

        .player-container:-webkit-full-screen ~ .video-info,
        .player-container:-moz-full-screen ~ .video-info,
        .player-container:fullscreen ~ .video-info {
            display: none !important;
        }

        /* === ГЛАВНЫЙ ЭКРАН === */
        .main-screen {
            display: block;
        }
        .main-screen h1 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .video-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.02);
        }
        .video-card:active {
            transform: scale(0.96);
        }
        .video-card .thumbnail {
            width: 100%;
            padding-top: 56.25%;
            background: #2a2a2a;
            position: relative;
            overflow: hidden;
        }
        .video-card .thumbnail video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-card .thumbnail .play-icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: rgba(255,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-card .thumbnail .play-icon-overlay svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            margin-left: 3px;
        }
        .video-card .card-info {
            padding: 12px;
        }
        .video-card .card-info .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-card .card-info .card-meta {
            font-size: 12px;
            color: #aaa;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 0;
            margin-bottom: 12px;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:hover {
            color: #ff0000;
        }
        .back-btn.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }
            .main-screen h1 {
                font-size: 20px;
            }
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 10px;
            }
            .video-card .card-info .card-title {
                font-size: 12px;
            }
            .video-card .card-info .card-meta {
                font-size: 11px;
            }
            .controls-bottom button svg {
                width: 20px;
                height: 20px;
            }
            .time-display {
                font-size: 12px;
                min-width: 60px;
            }
            .center-play {
                width: 52px;
                height: 52px;
            }
            .center-play svg {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Кнопка назад -->
    <button class="back-btn" id="backBtn">← Назад к списку</button>

    <!-- Плеер -->
    <div class="player-container" id="playerContainer">
        <div class="video-wrapper" id="videoWrapper">
            <video id="myVideo" preload="metadata" playsinline></video>

            <div class="overlay" id="overlay"></div>

            <div class="center-play" id="centerPlay">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </div>

            <div class="controls" id="controls">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="controls-bottom">
                    <button id="playPauseBtn">
                        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" id="playIcon"/></svg>
                    </button>

                    <span class="time-display" id="timeDisplay">00:00 / 00:00</span>

                    <div class="spacer"></div>

                    <div class="timeline-dropdown">
                        <button class="timeline-btn" id="timelineBtn">⏱ Таймкод</button>
                        <div class="dropdown-content" id="timelineMenu">
                            <button data-time="213"><span class="time-label">3:33</span> майнит</button>

                            <button data-time="1005"><span class="time-label">16:45</span> байнит</button>
                        </div>
                    </div>

                    <div class="speed-dropdown">
                        <button class="speed-btn" id="speedBtn">1x</button>
                        <div class="dropdown-content" id="speedMenu">
                            <button data-speed="0.5">0.5x</button>
                            <button data-speed="0.75">0.75x</button>
                            <button data-speed="1" class="active">1x</button>
                            <button data-speed="1.25">1.25x</button>
                            <button data-speed="1.5">1.5x</button>
                            <button data-speed="2">2x</button>
                        </div>
                    </div>

                    <button id="fullscreenBtn">
                        <svg viewBox="0 0 24 24" id="fsIcon">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <button class="close-fs" id="closeFsBtn">✕</button>
    </div>

    <!-- Главный экран -->
    <div class="main-screen" id="mainScreen">
        <h1>🎬 Мои видео</h1>
        <div class="video-grid" id="videoGrid">
            <!-- Видео 1 -->
            <div class="video-card" data-video="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105" data-title="Назвал девушку и грубо заставил отрабатывать измену" data-duration="18:30">
                <div class="thumbnail">
                    <video muted preload="metadata" src="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105"></video>
                    <div class="play-icon-overlay">
                        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                    </div>
                </div>
                <div class="card-info">
                    <div class="card-title">Назвал девушку и грубо заставил отрабатывать измену</div>
                    <div class="card-meta">18:30 · 1.46M просмотров</div>
                </div>
            </div>

            <!-- Видео 2 -->
            <div class="video-card" data-video="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105" data-title="Второе видео для теста" data-duration="12:15">
                <div class="thumbnail">
                    <video muted preload="metadata" src="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105"></video>
                    <div class="play-icon-overlay">
                        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                    </div>

                    <div class="card-title">Второе видео для теста</div>
                    <div class="card-meta">12:15 · 856K просмотров</div>

            </div>

            <!-- Видео 3 -->
            <div class="video-card" data-video="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105" data-title="Третье видео с длинным названием чтобы проверить как обрезается текст" data-duration="25:42">
                <div class="thumbnail">
                    <video muted preload="metadata" src="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105"></video>

</div>

<script>
    // === ДАННЫЕ ===
    let currentVideoIndex = 0;
    const videoData = [];

    document.querySelectorAll('.video-card').forEach((card, index) => {
        videoData.push({
            src: card.dataset.video,
            title: card.dataset.title,
            duration: card.dataset.duration
        });
    });

    // === ЭЛЕМЕНТЫ ===
    const mainScreen = document.getElementById('mainScreen');
    const playerContainer = document.getElementById('playerContainer');
    const backBtn = document.getElementById('backBtn');
    const videoGrid = document.getElementById('videoGrid');
    const video = document.getElementById('myVideo');
    const wrapper = document.getElementById('videoWrapper');
    const controls = document.getElementById('controls');
    const centerPlay = document.getElementById('centerPlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const timeDisplay = document.getElementById('timeDisplay');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const speedBtn = document.getElementById('speedBtn');
    const speedMenu = document.getElementById('speedMenu');
    const timelineBtn = document.getElementById('timelineBtn');
    const timelineMenu = document.getElementById('timelineMenu');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const closeFsBtn = document.getElementById('closeFsBtn');
    const fsIcon = document.getElementById('fsIcon');

    let controlsTimeout = null;
    let isControlsVisible = false;
    let isDragging = false;
    let isPlayerOpen = false;

    // === ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ГЛАВНЫМ ЭКРАНОМ И ПЛЕЕРОМ ===
    function openPlayer(src, title) {
        mainScreen.style.display = 'none';
        playerContainer.classList.add('active');
        backBtn.classList.add('show');
        isPlayerOpen = true;

        // Загружаем видео
        video.src = src;
        video.load();
        video.play().then(() => {
            playIcon.setAttribute('d', 'M6,4h4v16H6V4z M14,4h4v16h-4V4z');
            centerPlay.classList.remove('show');
            showControls();
        }).catch(() => {
            // Автоплей заблокирован — показываем кнопку
            centerPlay.classList.add('show');
            showControls();
        });
    }

    function closePlayer() {
        video.pause();
        video.src = '';
        video.load();
        playerContainer.classList.remove('active');
        backBtn.classList.remove('show');
        mainScreen.style.display = 'block';
        isPlayerOpen = false;
        centerPlay.classList.add('show');
        playIcon.setAttribute('d', 'M5,3 L19,12 L5,21 Z');
    }

    // === КЛИК ПО ВИДЕО В СПИСКЕ ===
    videoGrid.querySelectorAll('.video-card').forEach((card) => {
        card.addEventListener('click', () => {
            const src = card.dataset.video;
            const title = card.dataset.title;
            openPlayer(src, title);
        });
    });

    // === КНОПКА НАЗАД ===
    backBtn.addEventListener('click', closePlayer);

    // === УПРАВЛЕНИЕ ПЛЕЕРОМ ===
    function showControls() {
        controls.classList.add('show');
        if (video.paused) {
            centerPlay.classList.add('show');
        }
        isControlsVisible = true;
        clearTimeout(controlsTimeout);

        if (!video.paused) {
            controlsTimeout = setTimeout(() => {
                controls.classList.remove('show');
                isControlsVisible = false;
            }, 3000);
        }
    }

    function hideControls() {
        controls.classList.remove('show');
        centerPlay.classList.remove('show');
        isControlsVisible = false;
        clearTimeout(controlsTimeout);
    }

    function toggleControls() {
        if (isControlsVisible) {
            hideControls();
        } else {
            showControls();
        }
    }

    function togglePlay() {
        if (video.paused) {
            video.play();
            playIcon.setAttribute('d', 'M6,4h4v16H6V4z M14,4h4v16h-4V4z');
            centerPlay.classList.remove('show');
            showControls();
        } else {
            video.pause();
            playIcon.setAttribute('d', 'M5,3 L19,12 L5,21 Z');
            centerPlay.classList.add('show');
            showControls();
        }
    }

    // === ПРОГРЕСС-БАР ===
    function getTimeFromEvent(e) {
        const rect = progressBar.getBoundingClientRect();
        let x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = x / rect.width;
        return { time: percent * video.duration, percent };
    }

    function updateProgress(e) {
        if (!video.duration) return;
        const { time, percent } = getTimeFromEvent(e);
        if (isNaN(time)) return;
        video.currentTime = time;
        progressFill.style.width = percent * 100 + '%';
    }

    function startDrag(e) {
        e.preventDefault();
        isDragging = true;
        video.pause();
        updateProgress(e);
    }

    function moveDrag(e) {
        if (isDragging) {
            e.preventDefault();
            updateProgress(e);
        }
    }

    function endDrag(e) {
        if (isDragging) {
            isDragging = false;
            const { time } = getTimeFromEvent(e);
            if (!isNaN(time) && video.duration) {
                video.currentTime = time;
                const percent = (time / video.duration) * 100;
                progressFill.style.width = percent + '%';
            }
            if (video.paused) {
                centerPlay.classList.add('show');
                showControls();
            } else {
                video.play();
                showControls();
            }
        }
    }

    progressBar.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', moveDrag);
    document.addEventListener('mouseup', endDrag);

    progressBar.addEventListener('touchstart', startDrag);
    document.addEventListener('touchmove', moveDrag, { passive: false });
    document.addEventListener('touchend', endDrag);

    // === СОБЫТИЯ ===
    wrapper.addEventListener('click', (e) => {
        if (e.target.closest('button') || e.target.closest('.center-play') || 
            e.target.closest('.speed-dropdown') || e.target.closest('.timeline-dropdown')) {
            return;
        }
        toggleControls();
    });

    wrapper.addEventListener('mouseenter', () => {
        if (isPlayerOpen) showControls();
    });

    wrapper.addEventListener('mouseleave', () => {
        if (!video.paused && !isDragging && isPlayerOpen) {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused && !isDragging) {
                    hideControls();
                }
            }, 2000);
        }
    });

    playPauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay();
        showControls();
    });

    centerPlay.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay();
        showControls();
    });

    video.addEventListener('ended', () => {
        playIcon.setAttribute('d', 'M5,3 L19,12 L5,21 Z');
        centerPlay.classList.add('show');
        showControls();
    });

    // === ВРЕМЯ ===
    video.addEventListener('timeupdate', () => {
        const current = formatTime(video.currentTime);
        const total = formatTime(video.duration);
        timeDisplay.textContent = `${current} / ${total}`;

        if (video.duration && !isDragging) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = percent + '%';
        }
    });

    function formatTime(seconds) {
        if (isNaN(seconds)) return '00:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // === ТАЙМКОДЫ ===
    timelineBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        timelineMenu.classList.toggle('show');
    });

    document.addEventListener('click', () => {
        timelineMenu.classList.remove('show');
        speedMenu.classList.remove('show');
    });

    timelineMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const time = parseFloat(btn.dataset.time);
            if (!isNaN(time) && video.duration) {
                video.currentTime = time;
                progressFill.style.width = (time / video.duration) * 100 + '%';
                showControls();
                if (video.paused) {
                    centerPlay.classList.add('show');
                }
            }
            timelineMenu.classList.remove('show');
        });
    });

    // === СКОРОСТЬ ===
    speedBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        speedMenu.classList.toggle('show');
    });

    speedMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const speed = parseFloat(btn.dataset.speed);
            video.playbackRate = speed;
            speedBtn.textContent = speed + 'x';

            speedMenu.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            speedMenu.classList.remove('show');
            showControls();
        });
    });

    // === FULLSCREEN ===
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            if (playerContainer.requestFullscreen) {
                playerContainer.requestFullscreen();
            } else if (playerContainer.webkitRequestFullscreen) {
                playerContainer.webkitRequestFullscreen();
            } else if (playerContainer.msRequestFullscreen) {
                playerContainer.msRequestFullscreen();
            }
            try {
                screen.orientation?.lock('landscape');
            } catch(e) {}
            fsIcon.setAttribute('d', 'M5,16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6,11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z');
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            try {
                screen.orientation?.unlock();
            } catch(e) {}
            fsIcon.setAttribute('d', 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
        }
        showControls();
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            fsIcon.setAttribute('d', 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
        }
        showControls();
    });

    fullscreenBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullscreen();
    });

    closeFsBtn.addEventListener('click', () => {
        if (document.fullscreenElement) {
            toggleFullscreen();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.fullscreenElement) {
            toggleFullscreen();
        }
    });

    // === СТАРТ ===
    setTimeout(() => {
        showControls();
    }, 500);
</script>

</body>
</html>
