<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adult Video Catalog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; color: #f0f0f0; font-family: Arial, sans-serif; padding: 20px; }
        .header { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 2px solid #ff3366; }
        .header h1 { color: #ff3366; font-size: 28px; letter-spacing: 2px; }
        .menu { display: flex; justify-content: center; gap: 30px; margin: 15px 0; flex-wrap: wrap; }
        .menu a { color: #ccc; text-decoration: none; font-size: 14px; text-transform: uppercase; padding: 8px 16px; background: #222; border-radius: 4px; }
        .menu a:hover { background: #ff3366; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #2a2a2a; }
        .card:hover { transform: scale(1.02); border-color: #ff3366; }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #111; }
        .card .info { padding: 12px; }
        .card .info h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
        .card .info span { font-size: 12px; color: #888; }
        .video-container { margin-top: 30px; background: #111; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        video { width: 100%; max-height: 500px; background: #000; border-radius: 4px; }
        .footer { text-align: center; margin-top: 40px; padding: 20px; color: #444; font-size: 12px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <h1>XXX Video Archive</h1>
    <div class="menu">
        <a href="#">Популярное</a>
        <a href="#">Новое</a>
        <a href="#">Категории</a>
        <a href="#">Топ</a>
    </div>
</div>

<div class="grid" id="catalog">
    <!-- Карточки генерируются через JS -->
</div>

<div class="video-container" id="playerContainer">
    <video id="mainPlayer" controls preload="metadata">
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
    </video>
    <p style="margin-top:10px; color:#666; text-align:center;">Выберите видео из каталога</p>
</div>

<div class="footer">© 2026 Видеоархив. 18+</div>

<script>
    // Имитация каталога с превью (используются тестовые видео и заглушки)
    const videos = [
        { title: 'Сцена #01', duration: '12:34', thumb: 'https://via.placeholder.com/320x180/440022/ff66aa?text=18+', src: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' },
        { title: 'Сцена #02', duration: '08:21', thumb: 'https://via.placeholder.com/320x180/330055/ff77bb?text=18+', src: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4' },
        { title: 'Сцена #03', duration: '15:07', thumb: 'https://via.placeholder.com/320x180/550033/ff6699?text=18+', src: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4' },
        { title: 'Сцена #04', duration: '09:44', thumb: 'https://via.placeholder.com/320x180/220066/ff88cc?text=18+', src: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4' },
        { title: 'Сцена #05', duration: '11:22', thumb: 'https://via.placeholder.com/320x180/660044/ff55aa?text=18+', src: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4' }
    ];

    const catalog = document.getElementById('catalog');
    const player = document.getElementById('mainPlayer');

    // Рендер карточек
    videos.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${item.thumb}" alt="${item.title}" loading="lazy">
            <div class="info">
                <h3>${item.title}</h3>
                <span>${item.duration}</span>
            </div>
        `;
        card.addEventListener('click', () => {
            player.src = item.src;
            player.play();
        });
        catalog.appendChild(card);
    });

    // Если плеер не поддерживает формат, показываем ошибку
    player.onerror = () => {
        player.innerHTML = '<p style="color:#ff3366; padding:20px;">Ошибка: формат не поддерживается</p>';
    };
</script>

</body>
</html>
