<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>График работы 2/2 — Календарь</title>
    <style>
        :root {
            --work-bg: #fff9c4;
            --work-border: #f9a825;
            --work-text: #5d4037;
            --rest-bg: #bbdefb;
            --rest-border: #1565c0;
            --rest-text: #0d3b66;
            --today-ring: #ff5722;
            --other-month-opacity: 0.4;
            --cell-radius: 10px;
            --transition-speed: 0.15s;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #e8eaf6 0%, #f5f5f5 50%, #e3f2fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 24px 20px 20px;
            max-width: 520px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Шапка с навигацией ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            user-select: none;
        }

        .nav-btn {
            width: 38px;
            height: 38px;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed);
            flex-shrink: 0;
            line-height: 1;
        }
        .nav-btn:hover {
            background: #f0f0f0;
            border-color: #bbb;
            color: #222;
            transform: scale(1.05);
        }
        .nav-btn:active {
            transform: scale(0.94);
            transition: 0.05s;
        }
        .nav-btn.double {
            font-weight: 700;
            letter-spacing: -1px;
        }

        .month-title {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            text-transform: capitalize;
            letter-spacing: 0.3px;
            color: #333;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Дни недели ── */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 2px;
        }
        .weekdays span {
            padding: 4px 0;
        }

        /* ── Сетка дней ── */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-cell {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: var(--cell-radius);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            border: 2px solid transparent;
            transition: all var(--transition-speed);
            user-select: none;
            background: #fafafa;
            color: #aaa;
            min-width: 0;
        }

        /* Рабочий день (девки) */
        .day-cell.work-day {
            background: var(--work-bg);
            border-color: var(--work-border);
            color: var(--work-text);
        }

        /* Выходной день (пацаны) */
        .day-cell.rest-day {
            background: var(--rest-bg);
            border-color: var(--rest-border);
            color: var(--rest-text);
        }

        /* Дни других месяцев — полупрозрачные */
        .day-cell.other-month {
            opacity: var(--other-month-opacity);
        }
        .day-cell.other-month:hover {
            opacity: 0.7;
        }

        /* Текущий день — обводка */
        .day-cell.today {
            box-shadow: 0 0 0 3px var(--today-ring);
            z-index: 2;
            border-color: transparent !important;
        }

        /* Ховер-эффект */
        .day-cell:hover {
            filter: brightness(0.93);
            transform: scale(1.04);
            z-index: 3;
        }
        .day-cell:active {
            transform: scale(0.94);
            transition: 0.06s;
        }

        .day-num {
            font-size: 0.85rem;
            line-height: 1;
            font-weight: 700;
        }
        .icon {
            font-size: 1.1rem;
            line-height: 1;
            margin-top: 1px;
        }

        /* ── Статистика ── */
        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            background: #fafafa;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 0.9rem;
            border: 1px solid #eee;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #444;
            white-space: nowrap;
        }
        .stat-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: #222;
            min-width: 24px;
            text-align: center;
        }
        .stat-icon {
            font-size: 1.2rem;
        }
        .stat-item.work .stat-value {
            color: #e6a800;
        }
        .stat-item.rest .stat-value {
            color: #1565c0;
        }
        .stat-item.hours .stat-value {
            color: #2e7d32;
        }

        /* ── Кнопка сброса ── */
        .reset-btn {
            align-self: center;
            padding: 10px 28px;
            border: 2px solid #ddd;
            border-radius: 25px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            transition: all var(--transition-speed);
            letter-spacing: 0.3px;
            font-family: var(--font);
        }
        .reset-btn:hover {
            background: #f44336;
            color: #fff;
            border-color: #f44336;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }
        .reset-btn:active {
            transform: scale(0.96);
            transition: 0.06s;
        }

        /* ── Адаптив ── */
        @media (max-width: 420px) {
            .container {
                padding: 14px 10px 14px;
                gap: 10px;
                border-radius: 14px;
            }
            .day-cell {
                font-size: 0.75rem;
                border-radius: 7px;
            }
            .day-num {
                font-size: 0.7rem;
            }
            .icon {
                font-size: 0.9rem;
            }
            .nav-btn {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .month-title {
                font-size: 1rem;
            }
            .stats {
                gap: 8px;
                font-size: 0.78rem;
                padding: 10px 12px;
            }
            .stat-value {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Навигация по месяцам и годам -->
        <div class="header">
            <button class="nav-btn double" id="prevYearBtn" title="Предыдущий год">««</button>
            <button class="nav-btn" id="prevMonthBtn" title="Предыдущий месяц">‹</button>
            <span class="month-title" id="monthTitle">Январь 2026</span>
            <button class="nav-btn" id="nextMonthBtn" title="Следующий месяц">›</button>
            <button class="nav-btn double" id="nextYearBtn" title="Следующий год">»»</button>
        </div>

        <!-- Дни недели -->
        <div class="weekdays">
            <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>

        <!-- Сетка календаря -->
        <div class="calendar-grid" id="calendarGrid"></div>

        <!-- Статистика текущего месяца -->
        <div class="stats" id="statsPanel">
            <div class="stat-item work">
                <span>👧 Рабочих:</span>
                <span class="stat-value" id="workDays">0</span>
            </div>
            <div class="stat-item rest">
                <span>👦 Выходных:</span>
                <span class="stat-value" id="restDays">0</span>
            </div>
            <div class="stat-item hours">
                <span>⏱ Часов:</span>
                <span class="stat-value" id="workHours">0</span>
                <span>(×12)</span>
            </div>
        </div>

        <!-- Кнопка сброса -->
        <button class="reset-btn" id="resetBtn">🔄 Сбросить всё</button>
    </div>

    <script>
        (function() {
            // ═══════════════════════════════════════════════════════════
            // КОНСТАНТЫ
            // ═══════════════════════════════════════════════════════════
            const START_DATE_STR = '2026-01-01'; // Точка отсчёта графика
            const END_RECALC_STR = '2100-12-31'; // До какой даты пересчитываем
            const WORK_ICON = '👧'; // Иконка рабочего дня (девки)
            const REST_ICON = '👦'; // Иконка выходного дня (пацаны)
            const WORK = 'work';
            const REST = 'rest';

            // ═══════════════════════════════════════════════════════════
            // ГЛОБАЛЬНОЕ СОСТОЯНИЕ
            // ═══════════════════════════════════════════════════════════
            // Кэш статусов дней. Ключ: 'YYYY-MM-DD', значение: 'work' | 'rest'
            // Содержит ВСЕ дни от START_DATE до END_RECALC после инициализации.
            // При ручных правках значения перезаписываются.
            let dayStatuses = {};

            // Текущий отображаемый месяц (0 = январь, 11 = декабрь)
            let currentYear;
            let currentMonth; // 0..11

            // ═══════════════════════════════════════════════════════════
            // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ РАБОТЫ С ДАТАМИ
            // ═══════════════════════════════════════════════════════════

            /** Форматирует Date в строку 'YYYY-MM-DD' */
            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            /** Парсит строку 'YYYY-MM-DD' в объект Date (местное время, без сдвига) */
            function parseDate(str) {
                const [y, m, d] = str.split('-').map(Number);
                return new Date(y, m - 1, d);
            }

            /** Создаёт Date из года, месяца (0..11) и дня (1..31) */
            function makeDate(year, month, day) {
                return new Date(year, month, day);
            }

            // ═══════════════════════════════════════════════════════════
            // ПОСТРОЕНИЕ БАЗОВОГО ЦИКЛА 2/2 ОТ 1 ЯНВАРЯ 2026
            // ═══════════════════════════════════════════════════════════

            /**
             * Заполняет dayStatuses стандартным циклом 2/2:
             * 1 января 2026 — рабочий, далее каждые 2 дня чередование.
             * Диапазон: от START_DATE до END_RECALC включительно.
             */
            function buildBaseCycle() {
                dayStatuses = {};
                const startDate = parseDate(START_DATE_STR);
                const endDate = parseDate(END_RECALC_STR);
                const cursor = new Date(startDate);
                let status = WORK; // 1 января 2026 — рабочий
                let count = 0;

                while (cursor <= endDate) {
                    const key = formatDate(cursor);
                    dayStatuses[key] = status;
                    count++;
                    if (count >= 2) {
                        count = 0;
                        status = (status === WORK) ? REST : WORK;
                    }
                    cursor.setDate(cursor.getDate() + 1);
                }
            }

            /**
             * Возвращает статус дня.
             * Сначала проверяет кэш dayStatuses, если нет — вычисляет
             * по стандартному циклу от 2026-01-01 (для дат вне основного диапазона).
             */
            function getStatus(dateStr) {
                if (dayStatuses.hasOwnProperty(dateStr)) {
                    return dayStatuses[dateStr];
                }
                // Для дат вне кэша — вычисляем на лету
                return computeBaseStatus(dateStr);
            }

            /**
             * Вычисляет "базовый" статус для любой даты,
             * как если бы цикл 2/2 шёл от 1 января 2026 без изменений.
             */
            function computeBaseStatus(dateStr) {
                const start = parseDate(START_DATE_STR);
                const target = parseDate(dateStr);
                const diffDays = Math.floor((target - start) / (1000 * 60 * 60 * 24));

                if (diffDays >= 0) {
                    // 0,1 -> WORK; 2,3 -> REST; 4,5 -> WORK ...
                    const block = Math.floor(diffDays / 2);
                    return (block % 2 === 0) ? WORK : REST;
                } else {
                    // Экстраполяция назад: день -1 (31.12.2025) — REST,
                    // день -2 (30.12.2025) — REST, день -3 (29.12.2025) — WORK, ...
                    const pos = Math.abs(diffDays) - 1; // 0 для 31.12.2025
                    const block = Math.floor(pos / 2);
                    return (block % 2 === 0) ? REST : WORK;
                }
            }

            // ═══════════════════════════════════════════════════════════
            // ЛОГИКА ПЕРЕСЧЁТА ПОСЛЕ РУЧНОГО КЛИКА
            // ═══════════════════════════════════════════════════════════

            /**
             * Пересчитывает статусы всех дней ПОСЛЕ указанной даты (не включая её),
             * продолжая цикл 2/2, опираясь на новый статус этой даты.
             * Дни ДО переданной даты НЕ МЕНЯЮТСЯ.
             *
             * @param {string} anchorDateStr - дата, на которую кликнули (уже с новым статусом)
             */
            function recalculateAfter(anchorDateStr) {
                const anchorDate = parseDate(anchorDateStr);
                const anchorStatus = dayStatuses[anchorDateStr];
                if (!anchorStatus) return; // Защита

                // ── 1. Считаем, сколько дней ПОДРЯД с таким же статусом
                //        идёт назад от anchorDate (включая её саму) ──
                let runLength = 1;
                const checkDate = new Date(anchorDate);
                const startLimit = parseDate(START_DATE_STR);

                while (true) {
                    checkDate.setDate(checkDate.getDate() - 1);
                    if (checkDate < startLimit) break;
                    const checkStr = formatDate(checkDate);
                    if (getStatus(checkStr) === anchorStatus) {
                        runLength++;
                    } else {
                        break;
                    }
                }

                // ── 2. Определяем, с какого статуса начинать следующий день ──
                let currentStatus = anchorStatus;
                let daysLeft; // Сколько ещё дней держать currentStatus

                if (runLength >= 2) {
                    // Серия из 2 уже завершена, переключаем статус
                    currentStatus = (currentStatus === WORK) ? REST : WORK;
                    daysLeft = 2;
                } else {
                    // runLength == 1, нужно дополнить серию до 2
                    daysLeft = 2 - runLength; // то есть 1
                }

                // ── 3. Пересчитываем все дни после anchorDate до END_RECALC ──
                const cursor = new Date(anchorDate);
                cursor.setDate(cursor.getDate() + 1); // Начинаем со следующего дня
                const endDate = parseDate(END_RECALC_STR);

                while (cursor <= endDate) {
                    const key = formatDate(cursor);
                    dayStatuses[key] = currentStatus;
                    daysLeft--;
                    if (daysLeft === 0) {
                        // Переключаем статус для следующей серии
                        currentStatus = (currentStatus === WORK) ? REST : WORK;
                        daysLeft = 2;
                    }
                    cursor.setDate(cursor.getDate() + 1);
                }
            }

            // ═══════════════════════════════════════════════════════════
            // ОБРАБОТЧИК КЛИКА ПО ДНЮ
            // ═══════════════════════════════════════════════════════════

            /**
             * При клике на день:
             * 1. Меняем его статус на противоположный.
             * 2. Пересчитываем все дни ПОСЛЕ него по правилу 2/2.
             * 3. Перерисовываем календарь.
             */
            function handleDayClick(dateStr) {
                // Меняем статус кликнутого дня
                const oldStatus = getStatus(dateStr);
                const newStatus = (oldStatus === WORK) ? REST : WORK;
                dayStatuses[dateStr] = newStatus;

                // Пересчитываем будущее
                recalculateAfter(dateStr);

                // Обновляем отображение
                renderCalendar();
            }

            // ═══════════════════════════════════════════════════════════
            // ОТРИСОВКА КАЛЕНДАРЯ
            // ═══════════════════════════════════════════════════════════

            /**
             * Полностью перерисовывает календарь для currentYear/currentMonth.
             */
            function renderCalendar() {
                const year = currentYear;
                const month = currentMonth; // 0..11

                // ── Заголовок месяца ──
                const monthNames = [
                    'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                    'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
                ];
                document.getElementById('monthTitle').textContent =
                    `${monthNames[month]} ${year}`;

                // ── Вычисляем параметры месяца ──
                const firstDay = makeDate(year, month, 1);
                const lastDay = makeDate(year, month + 1, 0); // 0-й день след. месяца
                const daysInMonth = lastDay.getDate();

                // Смещение для сетки Пн–Вс: Пн=0, Вт=1, ..., Вс=6
                let startOffset = firstDay.getDay() - 1; // getDay(): 0=Вс
                if (startOffset < 0) startOffset = 6; // Воскресенье → 6

                const totalCells = 42; // 6 недель по 7 дней
                const todayStr = formatDate(new Date()); // Реальный сегодня

                // ── Собираем данные ячеек ──
                const cellsData = [];
                for (let i = 0; i < totalCells; i++) {
                    const dayOffset = i - startOffset;
                    const cellDate = makeDate(year, month, 1 + dayOffset);
                    const cellDateStr = formatDate(cellDate);
                    const cellMonth = cellDate.getMonth();
                    const isCurrentMonth = (cellMonth === month);
                    const isToday = (cellDateStr === todayStr);
                    const status = getStatus(cellDateStr);
                    const icon = (status === WORK) ? WORK_ICON : REST_ICON;
                    const cssClass = (status === WORK) ? 'work-day' : 'rest-day';

                    cellsData.push({
                        dateStr: cellDateStr,
                        dayNum: cellDate.getDate(),
                        isCurrentMonth,
                        isToday,
                        icon,
                        cssClass,
                    });
                }

                // ── Рендерим сетку ──
                const grid = document.getElementById('calendarGrid');
                grid.innerHTML = '';
                cellsData.forEach(cell => {
                    const div = document.createElement('div');
                    div.className = 'day-cell ' + cell.cssClass;
                    if (!cell.isCurrentMonth) div.classList.add('other-month');
                    if (cell.isToday) div.classList.add('today');
                    div.innerHTML =
                        `<span class="day-num">${cell.dayNum}</span><span class="icon">${cell.icon}</span>`;
                    div.addEventListener('click', () => handleDayClick(cell.dateStr));
                    grid.appendChild(div);
                });

                // ── Обновляем статистику для ТЕКУЩЕГО месяца ──
                updateStats(year, month);
            }

            /**
             * Подсчитывает и отображает статистику для указанного месяца.
             */
            function updateStats(year, month) {
                const daysInMonth = makeDate(year, month + 1, 0).getDate();
                let workCount = 0;
                let restCount = 0;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = formatDate(makeDate(year, month, d));
                    const status = getStatus(dateStr);
                    if (status === WORK) workCount++;
                    else restCount++;
                }

                document.getElementById('workDays').textContent = workCount;
                document.getElementById('restDays').textContent = restCount;
                document.getElementById('workHours').textContent = workCount * 12;
            }

            // ═══════════════════════════════════════════════════════════
            // НАВИГАЦИЯ ПО МЕСЯЦАМ И ГОДАМ
            // ═══════════════════════════════════════════════════════════

            function goToPrevMonth() {
                currentMonth--;
                if (currentMonth < 0) {
                    currentMonth = 11;
                    currentYear--;
                }
                renderCalendar();
            }

            function goToNextMonth() {
                currentMonth++;
                if (currentMonth > 11) {
                    currentMonth = 0;
                    currentYear++;
                }
                renderCalendar();
            }

            function goToPrevYear() {
                currentYear--;
                renderCalendar();
            }

            function goToNextYear() {
                currentYear++;
                renderCalendar();
            }

            // ═══════════════════════════════════════════════════════════
            // СБРОС ВСЕХ ПРАВОК
            // ═══════════════════════════════════════════════════════════

            function resetAll() {
                buildBaseCycle(); // Восстанавливаем стандартный цикл от 1 января 2026
                renderCalendar();
            }

            // ═══════════════════════════════════════════════════════════
            // ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
            // ═══════════════════════════════════════════════════════════

            function init() {
                // Строим базовый цикл
                buildBaseCycle();

                // Устанавливаем текущий месяц на "сегодня"
                const today = new Date();
                currentYear = today.getFullYear();
                currentMonth = today.getMonth();

                // Если сегодня раньше января 2026 — показываем январь 2026
                const startDate = parseDate(START_DATE_STR);
                if (today < startDate) {
                    currentYear = 2026;
                    currentMonth = 0;
                }

                // Первая отрисовка
                renderCalendar();

                // ── Привязываем обработчики кнопок ──
                document.getElementById('prevMonthBtn').addEventListener('click', goToPrevMonth);
                document.getElementById('nextMonthBtn').addEventListener('click', goToNextMonth);
                document.getElementById('prevYearBtn').addEventListener('click', goToPrevYear);
                document.getElementById('nextYearBtn').addEventListener('click', goToNextYear);
                document.getElementById('resetBtn').addEventListener('click', resetAll);

                // ── Клавиатурная навигация ──
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        goToPrevMonth();
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        goToNextMonth();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        goToPrevYear();
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        goToNextYear();
                    }
                });
            }

            // Запускаем всё после загрузки DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
