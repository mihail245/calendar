<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Видеоплеер с таймкодами</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #ff0000;
      --text: #e0e0e0;
      --muted: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* --- Сетка карточек --- */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(255, 0, 0, 0.15);
    }

    .preview-container {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: #111;
      overflow: hidden;
    }

    .preview-img, .preview-icon {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-icon {
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: #141414;
    }

    .card-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .card-meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* --- Экран плеера --- */
    #player-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
    }

    #player-screen.active { display: flex; }

    .player-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #000;
      margin: 24px auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* UI плеера */
    .controls-layer {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 72px;
      background: linear-gradient(to top, rgba(15,15,15,0.92), transparent);
      display: flex;
      align-items: flex-end;
      padding: 0 16px 12px 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(8px);
    }

    #player-screen:hover .controls-layer,
    .controls-layer.visible { opacity: 1; pointer-events: auto; }

    .progress-container {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      position: relative;
    }

    .time-display {
      display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 0.8rem; margin-bottom: 8px; }
    .time { font-weight: 500; color: #fff; }

    .btn-group { display: flex; gap: 12px; align-items: center; }
    .btn {
      background: transparent; border: none; color: #fff; cursor: pointer; padding: 8px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.accent { color: var(--accent); }

    .fullscreen-btn { padding: 10px; }

    /* Таймкоды */
    .timemarks-menu {
      position: absolute; top: 12px; right: 12px; z-index: 20;
    }
    .timemarks-btn {
      background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
    }
    .timemarks-list {
      position: absolute; bottom: 44px; right: 12px; background: var(--card); border-radius: 8px; padding: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none; max-height: 220px; overflow-y: auto;
    }
    .timemarks-list.open { display: block; }
    .timemark-item { padding: 6px 8px; cursor: pointer; color: #ccc; font-size: 0.85rem; }
    .timemark-item:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* Ошибки и состояния */
    .error-overlay {
      position: absolute; inset: 0; background: #0f0f0f; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 30;
      text-align: center; padding: 20px;
    }
    .error-overlay.visible { display: flex; }
    .error-icon { font-size: 64px; margin-bottom: 16px; }
    .retry-btn {
      margin-top: 16px; padding: 10px 20px; background: var(--accent); color: #000; font-weight: 700; border: none; border-radius: 6px; cursor: pointer;
    }
    .retry-btn:hover { background: #cc0000; }

    .back-btn {
      position: absolute; top: 20px; left: 20px; z-index: 40;
      background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer;
    }

    /* Адаптив */
    @media (max-width: 600px) {
      .video-grid { padding: 12px; }
      .player-wrapper { margin: 12px auto; }
      .controls-layer { padding: 0 10px 8px 10px; height: 60px; }
      .time-display { gap: 6px; font-size: 0.75rem; }
      .btn { padding: 6px; }
      .timemarks-btn { padding: 4px 8px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- Список видео -->
  <div class="video-grid" id="video-grid"></div>

  <!-- Экран плеера -->
  <div id="player-screen">
    <button class="back-btn" id="back-btn">← Назад</button>

    <div class="player-wrapper">
      <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <video id="main-video" playsinline></video>

      <div class="error-overlay" id="error-overlay">
        <div class="error-icon">⚠️</div>
        <h2>Видео недоступно</h2>
        <p style="margin: 8px 0; color: #aaa;">Не удалось загрузить видеофайл.</p>
        <button class="retry-btn" id="retry-btn">Попробовать снова</button>
      </div>

      <div class="timemarks-menu">
        <button class="timemarks-btn" id="timemarks-toggle">⏱ Таймкод</button>
        <div class="timemarks-list" id="timemarks-list"></div>
      </div>

      <div class="controls-layer" id="controls-layer">
        <div class="time-display">
          <span class="time" id="current-time">0:00</span>
          <span>/</span>
          <span class="time" id="duration-time">0:00</span>
        </div>
        <div class="btn-group">
          <button class="btn" id="play-pause-btn" title="Воспроизвести / Пауза">▶</button>
          <button class="btn fullscreen-btn" id="fullscreen-btn" title="Полноэкранный режим">📺</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const videos = [
    {
      id: 1,
      title: "Тестовый ролик (Wikimedia)",
      src: "https://upload.wikimedia.org/wikipedia/commons/transcoded/a/a4/Elephants_Dream_%282006%29.webm/Elephants_Dream_%282006%29.webm.360p.webm",
      description: "Короткометражный фильм с открытым исходным кодом. Демонстрирует работу плеера.",
      meta: "Wikimedia Commons",
      previewTime: 5,
      timemarks: [
        { time: 10, label: "Вступление" },
        { time: 30, label: "Основная сцена" },
        { time: 60, label: "Финал" }
      ]
    },
    {
      id: 2,
      title: "Пример с вашей ссылкой",
      src: "https://sel9incestiksektor.tophotvideos.com/remote_control.php?time=1783816106&cv=6a5e22744e3ac3c566adb30f29613179&lr=566250&cv2=24b50f9123aabe70a43fab9269559915&file=%2Fvideos%2F70000%2F70990%2F70990.mp4&cv3=6ba8c3f689e70beceee21fb2c741bed6&cv4=d4b9d3fa47d55d94297edce3003eaf02",
      description: "Ссылка предоставлена пользователем. Может не работать из-за CORS/блокировок.",
      meta: "Внешний источник",
      previewTime: 10,
      timemarks: [
        { time: 20, label: "Момент 1" },
        { time: 45, label: "Момент 2" }
      ]
    }
  ];

  // DOM элементы
  const grid = document.getElementById('video-grid');
  const playerScreen = document.getElementById('player-screen');
  const videoEl = document.getElementById('main-video');
  const backBtn = document.getElementById('back-btn');
  const playPauseBtn = document.getElementById('play-pause-btn');
  const fullscreenBtn = document.getElementById('fullscreen-btn');
  const progressContainer = document.getElementById('progress-container');
  const progressBar = document.getElementById('progress-bar');
  const currentTimeEl = document.getElementById('current-time');
  const durationTimeEl = document.getElementById('duration-time');
  const controlsLayer = document.getElementById('controls-layer');
  const timemarksToggle = document.getElementById('timemarks-toggle');
  const timemarksList = document.getElementById('timemarks-list');
  const errorOverlay = document.getElementById('error-overlay');
  const retryBtn = document.getElementById('retry-btn');

  let currentVideoIndex = -1;
  let hideControlsTimeout;

  // Форматирование времени
  function formatTime(t) {
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    return `${m}:${s < 10 ? '0' : ''}${s}`;
  }

  // Генерация превью через Canvas
  async function generatePreview(src, time) {
    return new Promise((resolve) => {
      const tempVideo = document.createElement('video');
      tempVideo.src = src;
      tempVideo.crossOrigin = 'Anonymous';
      tempVideo.onloadedmetadata = () => {
        tempVideo.currentTime = time;
        tempVideo.addEventListener('seeked', () => {
          const canvas = document.createElement('canvas');
          canvas.width = 240;
          canvas.height = 135;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(tempVideo, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          resolve(dataUrl);
        }, { once: true });
      };
      tempVideo.onerror = () => resolve(null);
    });
  }

  // Рендер карточек
  async function renderGrid() {
    grid.innerHTML = '';
    for (const v of videos) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = v.id;

      let previewSrc = null;
      try {
        previewSrc = await generatePreview(v.src, v.previewTime);
      } catch (e) {
        // Если превью не удалось — оставим null
