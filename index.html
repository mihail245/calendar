<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеокаталог</title>
    <style>
        body { font-family: Arial; background: #111; color: #eee; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
        .card { background: #222; border-radius: 8px; width: 300px; padding: 10px; }
        .card video { width: 100%; border-radius: 5px; }
        .card h3 { font-size: 16px; margin: 8px 0; }
    </style>
</head>
<body>
    <h1 style="text-align:center; padding:20px;">Архив видеозаписей</h1>
    <div class="grid" id="videoGrid"></div>

    <script>
        // Список прокси-ссылок на открытые видеохостинги (без прямого указания тематики)
        const sources = [
            'https://www.w3schools.com/html/mov_bbb.mp4',
            'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
            'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',
            'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
            'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4'
        ];

        const titles = ['Ролик #1', 'Клип #2', 'Сцена #3', 'Фрагмент #4', 'Отрывок #5'];

        const grid = document.getElementById('videoGrid');

        sources.forEach((src, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video controls preload="metadata">
                    <source src="${src}" type="video/mp4">
                </video>
                <h3>${titles[index % titles.length]}</h3>
                <p style="font-size:12px; color:#888;">Источник: открытый хостинг</p>
            `;
            grid.appendChild(card);
        });

        // Эмуляция парсинга — в реальности используется fetch + прокси
        console.log('Каталог загружен. Добавьте свои источники через массив sources.');
    </script>
</body>
</html>
