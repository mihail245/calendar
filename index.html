<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Видео-плеер с таймкодами</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #ff0000;
      --text: #ffffff;
      --muted: #aaaaaa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      width: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 1.4rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: none;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .back-btn span {
      font-size: 1.1rem;
    }

    .back-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .card-preview {
      position: relative;
      background: #111;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 2rem;
    }

    .card-preview canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card-content {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Player layout */
    .player-screen {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .player-screen.active {
      display: flex;
    }

    .list-screen.active {
      display: block;
    }

    .list-screen {
      display: none;
    }

    .player-wrapper {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .video-container {
      position: relative;
      background: #000;
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 10px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .controls-left,
    .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn {
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .control-btn.accent {
      color: var(--accent);
    }

    .time-display {
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 90px;
    }

    .progress-wrapper {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .progress {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: #333;
      cursor: pointer;
    }

    .progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .progress::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }

    .progress::-moz-range-track {
      background: #333;
      height: 4px;
      border-radius: 999px;
    }

    .player-info {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .player-meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .player-desc {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Timemarks */
    .timemark-wrapper {
      position: relative;
      display: inline-block;
    }

    .timemark-menu {
      position: absolute;
      right: 0;
      bottom: 110%;
      background: #181818;
      border-radius: 8px;
      padding: 6px 0;
      min-width: 180px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    .timemark-item {
      padding: 6px 10px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }

    .timemark-item:hover {
      background: #222;
    }

    .timemark-time {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Error overlay */
    .error-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      padding: 12px;
    }

    .error-overlay p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .retry-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header h1 {
        font-size: 1.1rem;
      }
      .controls-row {
        flex-wrap: wrap;
      }
      .time-display {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Видео-галерея</h1>
      <button class="back-btn hidden" id="backBtn">
        <span>←</span> Назад
      </button>
    </header>

    <main>
      <section class="list-screen active" id="listScreen">
        <div class="grid" id="videoGrid"></div>
      </section>

      <section class="player-screen" id="playerScreen">
        <div class="player-wrapper">
          <div class="video-container" id="videoContainer">
            <video id="video" preload="metadata"></video>

            <div class="controls" id="controls">
              <div class="progress-wrapper">
                <input type="range" id="progress" class="progress" min="0" max="100" value="0" />
              </div>
              <div class="controls-row">
                <div class="controls-left">
                  <button class="control-btn accent" id="playPauseBtn">▶</button>
                  <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                </div>
                <div class="controls-right">
                  <div class="timemark-wrapper">
                    <button class="control-btn" id="timemarkToggle">⏱ Таймкод</button>
                    <div class="timemark-menu" id="timemarkMenu" style="display:none;"></div>
                  </div>
                  <button class="control-btn" id="fullscreenBtn">⛶</button>
                </div>
              </div>
            </div>

            <div class="error-overlay" id="errorOverlay" style="display:none;">
              <p>Видео недоступно</p>
              <button class="retry-btn" id="retryBtn">Попробовать снова</button>
            </div>
          </div>

          <div class="player-info">
            <div class="player-title" id="playerTitle"></div>
            <div class="player-meta" id="playerMeta"></div>
            <div class="player-desc" id="playerDesc"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Вставь сюда свои реальные ссылки на MP4
    const videos = [
      {
        id: 1,
        title: "Пример видео 1",
        src: "https://example.com/video1.mp4",
        description: "Описание первого видео.",
        meta: "Автор 1",
        previewTime: 5,
        timemarks: [
          { time: 10, label: "Интересный момент" },
          { time: 30, label: "Важная часть" }
        ]
      },
      {
        id: 2,
        title: "Пример видео 2",
        src: "https://example.com/video2.mp4",
        description: "Описание второго видео.",
        meta: "Автор 2",
        previewTime: 8,
        timemarks: [
          { time: 5, label: "Начало сюжета" },
          { time: 45, label: "Кульминация" }
        ]
      }
    ];

    const gridEl = document.getElementById("videoGrid");
    const listScreen = document.getElementById("listScreen");
    const playerScreen = document.getElementById("playerScreen");
    const backBtn = document.getElementById("backBtn");

    const videoEl = document.getElementById("video");
    const controlsEl = document.getElementById("controls");
    const progressEl = document.getElementById("progress");
    const timeDisplayEl = document.getElementById("timeDisplay");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const timemarkToggle = document.getElementById("timemarkToggle");
    const timemarkMenu = document.getElementById("timemarkMenu");
    const errorOverlay = document.getElementById("errorOverlay");
    const retryBtn = document.getElementById("retryBtn");
    const videoContainer = document.getElementById("videoContainer");

    const playerTitle = document.getElementById("playerTitle");
    const playerMeta = document.getElementById("playerMeta");
    const playerDesc = document.getElementById("playerDesc");

    let currentVideo = null;
    let controlsHideTimeout = null;
    let isControlsVisible = true;

    // Форматирование времени
    function formatTime(sec) {
      if (isNaN(sec)) return "00:00";
      const s = Math.floor(sec % 60);
      const m = Math.floor(sec / 60);
      const mm = m.toString().padStart(2, "0");
      const ss = s.toString().padStart(2, "0");
      return `${mm}:${ss}`;
    }

    // Показ/скрытие экранов
    function showList() {
      playerScreen.classList.remove("active");
      listScreen.classList.add("active");
      backBtn.classList.add("hidden");
      videoEl.pause();
      currentVideo = null;
    }

    function showPlayer(videoData) {
      currentVideo = videoData;
      listScreen.classList.remove("active");
      playerScreen.classList.add("active");
      backBtn.classList.remove("hidden");

      playerTitle.textContent = videoData.title;
      playerMeta.textContent = videoData.meta || "";
      playerDesc.textContent = videoData.description || "";

      errorOverlay.style.display = "none";
      videoEl.src = videoData.src;
      videoEl.load();
      videoEl.play().catch(() => {
        // Если автозапуск не удался — просто оставить на паузе
      });

      buildTimemarkMenu(videoData);
      resetControlsVisibility();
    }

    backBtn.addEventListener("click", showList);

    // Создание карточек
    function createCard(videoData) {
      const card = document.createElement("div");
      card.className = "card";

      const preview = document.createElement("div");
      preview.className = "card-preview";

      const canvas = document.createElement("canvas");
      preview.appendChild(canvas);

      const iconFallback = document.createElement("div");
      iconFallback.textContent = "🎬";
      iconFallback.style.display = "none";
      preview.appendChild(iconFallback);

      const content = document.createElement("div");
      content.className = "card-content";

      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = videoData.title;

      const meta = document.createElement("div");
      meta.className = "card-meta";
      meta.textContent = videoData.meta || "";

      const desc = document.createElement("div");
      desc.className = "card-desc";
      desc.textContent = videoData.description || "";

      content.appendChild(title);
      content.appendChild(meta);
      content.appendChild(desc);

      card.appendChild(preview);
      card.appendChild(content);

      // Генерация превью через временный video + canvas
      generatePreview(videoData, canvas, iconFallback);

      card.addEventListener("click", () => {
        showPlayer(videoData);
      });

      return card;
    }

    function generatePreview(videoData, canvas, iconFallback) {
      const tempVideo = document.createElement("video");
      tempVideo.src = videoData.src;
      tempVideo.preload = "metadata";
      tempVideo.muted = true;
      tempVideo.crossOrigin = "anonymous";

      const ctx = canvas.getContext("2d");

      tempVideo.addEventListener("loadeddata", () => {
        const w = tempVideo.videoWidth || 640;
        const h = tempVideo.videoHeight || 360;
        canvas.width = w;
        canvas.height = h;

        const targetTime = videoData.previewTime || 5;
        function captureFrame() {
          try {
            ctx.drawImage(tempVideo, 0, 0, w, h);
          } catch (e) {
            iconFallback.style.display = "block";
            canvas.style.display = "none";
          }
          tempVideo.pause();
          tempVideo.remove();
        }

        if (!isNaN(tempVideo.duration) && targetTime <= tempVideo.duration) {
          tempVideo.currentTime = targetTime;
          tempVideo.addEventListener("seeked", captureFrame, { once: true });
        } else {
          captureFrame();
        }
      });

      tempVideo.addEventListener("error", () => {
        iconFallback.style.display = "block";
        canvas.style.display = "none";
      });
    }

    // Заполнение сетки
    videos.forEach(v => {
      const card = createCard(v);
      gridEl.appendChild(card);
    });

    // Обновление прогресса и времени
    videoEl.addEventListener("timeupdate", () => {
      const current = videoEl.currentTime;
      const duration = videoEl.duration || 0;
      const percent = duration ? (current / duration) * 100 : 0;
      progressEl.value = percent;
      timeDisplayEl.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
    });

    videoEl.addEventListener("loadedmetadata", () => {
      timeDisplayEl.textContent = `${formatTime(0)} / ${formatTime(videoEl.duration)}`;
    });

    videoEl.addEventListener("play", () => {
      playPauseBtn.textContent = "⏸";
    });

    videoEl.addEventListener("pause", () => {
      playPauseBtn.textContent = "▶";
    });

    videoEl.addEventListener("click", () => {
      togglePlay();
    });

    // Ошибка загрузки
    videoEl.addEventListener("error", () => {
      errorOverlay.style.display = "flex";
    });

    retryBtn.addEventListener("click", () => {
      if (!currentVideo) return;
      errorOverlay.style.display = "none";
      videoEl.src = currentVideo.src;
      videoEl.load();
      videoEl.play().catch(() => {});
    });

    // Управление воспроизведением
    function togglePlay() {
      if (videoEl.paused) {
        videoEl.play().catch(() => {});
      } else {
        videoEl.pause();
      }
    }

    playPauseBtn.addEventListener("click", togglePlay);

    // Перемотка
    progressEl.addEventListener("input", () => {
      const duration = videoEl.duration || 0;
      const percent = parseFloat(progressEl.value);
      videoEl.currentTime = (percent / 100) * duration;
    });

    // Полноэкранный режим
    fullscreenBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        if (videoContainer.requestFullscreen) {
          videoContainer.requestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    });

    // Таймкоды
    function buildTimemarkMenu(videoData) {
      timemarkMenu.innerHTML = "";
      if (!videoData.timemarks || !videoData.timemarks.length) {
        const empty = document.createElement("div");
        empty.className = "timemark-item";
        empty.textContent = "Нет таймкодов";
        timemarkMenu.appendChild(empty);
        return;
      }

      videoData.timemarks.forEach(mark => {
        const item = document.createElement("div");
        item.className = "timemark-item";
        const labelSpan = document.createElement("span");
        labelSpan.textContent = mark.label;
        const timeSpan = document.createElement("span");
        timeSpan.className = "timemark-time";
        timeSpan.textContent = formatTime(mark.time);
        item.appendChild(labelSpan);
        item.appendChild(timeSpan);

        item.addEventListener("click", () => {
          videoEl.currentTime = mark.time;
          videoEl.play().catch(() => {});
          timemarkMenu.style.display = "none";
        });

        timemarkMenu.appendChild(item);
      });
    }

    timemarkToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      timemarkMenu.style.display = timemarkMenu.style.display === "none" ? "block" : "none";
    });

    document.addEventListener("click", () => {
      timemarkMenu.style.display = "none";
    });

    // Авто-скрытие контролов
    function showControls() {
      controlsEl.classList.remove("hidden");
      isControlsVisible = true;
      if (controlsHideTimeout) {
        clearTimeout(controlsHideTimeout);
      }
      controlsHideTimeout = setTimeout(() => {
        if (!videoEl.paused) {
          controlsEl.classList.add("hidden");
          isControlsVisible = false;
        }
      }, 3000);
    }

    function resetControlsVisibility() {
      showControls();
    }

    videoContainer.addEventListener("mousemove", () => {
      showControls();
    });

    videoContainer.addEventListener("touchstart", () => {
      if (!isControlsVisible) {
        showControls();
      } else {
        controlsEl.classList.toggle("hidden");
        isControlsVisible = !isControlsVisible;
      }
    });

    // Управление клавиатурой: пробел, стрелки, F
    document.addEventListener("keydown", (e) => {
      if (!playerScreen.classList.contains("active")) return;

      if (e.code === "Space") {
        e.preventDefault();
        togglePlay();
        showControls();
      } else if (e.code === "ArrowRight") {
        videoEl.currentTime = Math.min(videoEl.currentTime + 5, videoEl.duration || videoEl.currentTime + 5);
        showControls();
      } else if (e.code === "ArrowLeft") {
        videoEl.currentTime = Math.max(videoEl.currentTime - 5, 0);
        showControls();
      } else if (e.key.toLowerCase() === "f") {
        fullscreenBtn.click();
        showControls();
      }
    });
  </script>
</body>
</html>
