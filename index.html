<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Видео плеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }

        .player-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 68px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
        }
        .center-play:focus {
            outline: none;
        }
        .center-play.show {
            opacity: 1;
        }
        .center-play svg {
            width: 36px;
            height: 36px;
            fill: #fff;
            margin-left: 4px;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 16px 14px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .controls.show {
            opacity: 1;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            margin-bottom: 10px;
            transition: height 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .progress-bar:hover {
            height: 6px;
        }
        .progress-fill {
            height: 100%;
            background: #ff0000;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .preview-tooltip {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 160px;
            height: 90px;
            background: #000;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 4px;
            overflow: hidden;
            z-index: 15;
            transform: translateX(-50%);
            pointer-events: none;
        }
        .preview-tooltip.show {
            display: block;
        }
        .preview-tooltip video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        .preview-tooltip .preview-time {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: monospace;
        }

        .controls-bottom {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls-bottom button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
            user-select: none;
        }
        .controls-bottom button:focus {
            outline: none;
        }
        .controls-bottom button:hover {
            color: #ff0000;
        }
        .controls-bottom button:active {
            color: #ff0000;
            transform: scale(0.92);
        }
        .controls-bottom button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            pointer-events: none;
        }
        .time-display {
            color: #fff;
            font-size: 13px;
            font-family: monospace;
            margin: 0 4px;
            min-width: 70px;
            user-select: none;
        }
        .spacer {
            flex: 1;
        }

        .speed-btn {
            background: rgba(255,255,255,0.08) !important;
            padding: 3px 10px !important;
            border-radius: 4px !important;
            font-size: 13px;
            font-weight: 600;
            color: #fff !important;
            min-width: 44px;
            text-align: center;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            user-select: none !important;
        }
        .speed-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ff0000 !important;
        }
        .speed-btn:focus {
            outline: none !important;
        }
        .speed-btn:active {
            transform: scale(0.92);
        }

        .speed-dropdown {
            position: relative;
            display: inline-block;
        }
        .speed-dropdown .dropdown-content {
            display: none;
            position: absolute;
            bottom: 110%;
            right: 0;
            background: rgba(30,30,30,0.95);
            border-radius: 8px;
            min-width: 90px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            backdrop-filter: blur(10px);
            padding: 4px 0;
        }
        .speed-dropdown .dropdown-content.show {
            display: block;
        }
        .speed-dropdown .dropdown-content button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .speed-dropdown .dropdown-content button:focus {
            outline: none;
        }
        .speed-dropdown .dropdown-content button:hover {
            background: #ff0000;
            color: #fff;
        }
        .speed-dropdown .dropdown-content button.active {
            color: #ff0000;
            font-weight: bold;
        }

        .timeline-btn {
            background: rgba(255,255,255,0.08) !important;
            padding: 3px 10px !important;
            border-radius: 4px !important;
            font-size: 13px;
            font-weight: 600;
            color: #fff !important;
            text-align: center;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            user-select: none !important;
        }
        .timeline-btn:hover {
            background: rgba(255,255,255,0.2) !important;
            color: #ff0000 !important;
        }
        .timeline-btn:focus {
            outline: none !important;
        }
        .timeline-btn:active {
            transform: scale(0.92);
        }

        .timeline-dropdown {
            position: relative;
            display: inline-block;
        }
        .timeline-dropdown .dropdown-content {
            display: none;
            position: absolute;
            bottom: 110%;
            right: 0;
            background: rgba(30,30,30,0.95);
            border-radius: 8px;
            min-width: 160px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            backdrop-filter: blur(10px);
            padding: 4px 0;
        }
        .timeline-dropdown .dropdown-content.show {
            display: block;
        }
        .timeline-dropdown .dropdown-content button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .timeline-dropdown .dropdown-content button:focus {
            outline: none;
        }
        .timeline-dropdown .dropdown-content button:hover {
            background: #ff0000;
            color: #fff;
        }
        .timeline-dropdown .dropdown-content button .time-label {
            color: #ff0000;
            font-weight: bold;
            margin-right: 8px;
        }

        .video-info {
            margin-top: 16px;
        }
        .video-title {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
        }
        .video-meta {
            color: #aaa;
            font-size: 14px;
            margin-top: 6px;
        }
        .video-description {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
            line-height: 1.6;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
        }

        .player-container:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            background: #000 !important;
        }
        .player-container:-moz-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            background: #000 !important;
        }
        .player-container:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            background: #000 !important;
        }

        .player-container:-webkit-full-screen .video-wrapper {
            padding-top: 0 !important;
            height: 100vh !important;
        }
        .player-container:-moz-full-screen .video-wrapper {
            padding-top: 0 !important;
            height: 100vh !important;
        }
        .player-container:fullscreen .video-wrapper {
            padding-top: 0 !important;
            height: 100vh !important;
        }

        .player-container:-webkit-full-screen .video-wrapper video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }
        .player-container:-moz-full-screen .video-wrapper video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }
        .player-container:fullscreen .video-wrapper video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }

        .player-container:-webkit-full-screen ~ .video-info,
        .player-container:-moz-full-screen ~ .video-info,
        .player-container:fullscreen ~ .video-info {
            display: none !important;
        }

        .close-fs {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .close-fs:focus {
            outline: none;
        }
        .close-fs:hover {
            background: rgba(255,0,0,0.6);
        }
        .close-fs:active {
            transform: scale(0.92);
        }
        .player-container:-webkit-full-screen .close-fs,
        .player-container:-moz-full-screen .close-fs,
        .player-container:fullscreen .close-fs {
            display: block;
        }

        @media (max-width: 700px) {
            body {
                padding: 16px 10px;
            }
            .video-title {
                font-size: 16px;
            }
            .video-description {
                font-size: 13px;
            }
            .controls-bottom button svg {
                width: 20px;
                height: 20px;
            }
            .time-display {
                font-size: 12px;
                min-width: 60px;
            }
            .center-play {
                width: 52px;
                height: 52px;
            }
            .center-play svg {
                width: 28px;
                height: 28px;
            }
            .preview-tooltip {
                width: 120px;
                height: 68px;
            }
            .timeline-dropdown .dropdown-content {
                min-width: 140px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="player-container" id="playerContainer">
        <div class="video-wrapper" id="videoWrapper">
            <video id="myVideo" preload="metadata" playsinline>
                <source src="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105" type="video/mp4">
            </video>

            <div class="preview-tooltip" id="previewTooltip">
                <video id="previewVideo" muted preload="auto"></video>
                <div class="preview-time" id="previewTime">00:00</div>
            </div>

            <div class="overlay" id="overlay"></div>

            <div class="center-play" id="centerPlay">

                <div class="controls-bottom">

                    <div class="timeline-dropdown">
                        <button class="timeline-btn" id="timelineBtn">⏱ Таймкод</button>
                        <div class="dropdown-content" id="timelineMenu">
                            <button data-time="213"><span class="time-label">3:33</span> майнит</button>
                            <button data-time="416"><span class="time-label">6:56</span> глючит</button>
                            <button data-time="1005"><span class="time-label">16:45</span> байнит</button>
                        </div>
                    </div>

                    <div class="speed-dropdown">
                        <button class="speed-btn" id="speedBtn">1x</button>
                        <div class="dropdown-content" id="speedMenu">
                            <button data-speed="0.5">0.5x</button>
                            <button data-speed="0.75">0.75x</button>
                            <button data-speed="1" class="active">1x</button>
                            <button data-speed="1.25">1.25x</button>
                            <button data-speed="1.5">1.5x</button>
                            <button data-speed="2">2x</button>
                        </div>
                    </div>

                    <button id="fullscreenBtn">
                        <svg viewBox="0 0 24 24" id="fsIcon">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <button class="close-fs" id="closeFsBtn">✕</button>
    </div>

    <div class="video-info" id="videoInfo">
        <div class="video-title">Назвал девушку и грубо заставил отрабатывать измену</div>
        <div class="video-meta">© 1.46M просмотров</div>
        <div class="video-description">Назвал девушку и грубо заставил отрабатывать измену</div>
    </div>
</div>

<script>
    const playerContainer = document.getElementById('playerContainer');
    const video = document.getElementById('myVideo');
    const wrapper = document.getElementById('videoWrapper');
    const controls = document.getElementById('controls');
    const centerPlay = document.getElementById('centerPlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const timeDisplay = document.getElementById('timeDisplay');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const speedBtn = document.getElementById('speedBtn');
    const speedMenu = document.getElementById('speedMenu');
    const timelineBtn = document.getElementById('timelineBtn');
    const timelineMenu = document.getElementById('timelineMenu');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const closeFsBtn = document.getElementById('closeFsBtn');
    const fsIcon = document.getElementById('fsIcon');
    const videoInfo = document.getElementById('videoInfo');
    const previewTooltip = document.getElementById('previewTooltip');
    const previewVideo = document.getElementById('previewVideo');
    const previewTime = document.getElementById('previewTime');

    let controlsTimeout = null;
    let isControlsVisible = false;
    let isDragging = false;

    function showControls() {
        controls.classList.add('show');
        if (video.paused) {
            centerPlay.classList.add('show');
        }
        isControlsVisible = true;
        clearTimeout(controlsTimeout);

        if (!video.paused) {
            controlsTimeout = setTimeout(() => {
                controls.classList.remove('show');
                isControlsVisible = false;
            }, 3000);
        }
    }

    function hideControls() {
        controls.classList.remove('show');
        centerPlay.classList.remove('show');
        isControlsVisible = false;
        clearTimeout(controlsTimeout);
    }

    function toggleControls() {
        if (isControlsVisible) {
            hideControls();
        } else {
            showControls();
        }
    }

    function togglePlay() {
        if (video.paused) {
            video.play();
            playIcon.setAttribute('d', 'M6,4h4v16H6V4z M14,4h4v16h-4V4z');
            centerPlay.classList.remove('show');
            showControls();
        } else {
            video.pause();
            playIcon.setAttribute('d', 'M5,3 L19,12 L5,21 Z');
            centerPlay.classList.add('show');
            showControls();
        }
    }

    // === ПРОГРЕСС-БАР С ПРЕВЬЮ И МГНОВЕННОЙ ПЕРЕМОТКОЙ ===
    function updateProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        let x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = x / rect.width;
        const time = percent * video.duration;

        if (!isNaN(time) && video.duration) {
            // Мгновенно перематываем видео
            video.currentTime = time;
            
            // Обновляем прогресс-бар
            progressFill.style.width = percent * 100 + '%';

            // Обновляем превью
            const tooltipX = Math.max(0, Math.min(x, rect.width - 80));
            previewTooltip.style.left = tooltipX + 'px';
            previewTime.textContent = formatTime(time);

            if (previewVideo.src !== video.src) {
                previewVideo.src = video.src;
                previewVideo.load();
            }
            
            // Показываем кадр из видео
            previewVideo.currentTime = time;
            previewVideo.play().catch(() => {});
        }
    }

    function startDrag(e) {
        isDragging = true;
        previewTooltip.classList.add('show');
        if (previewVideo.src !== video.src) {
            previewVideo.src = video.src;
            previewVideo.load();
        }
        video.pause();
        updateProgress(e);
    }

    function moveDrag(e) {
        if (isDragging) {
            e.preventDefault();
            updateProgress(e);
        }
    }

    function endDrag(e) {
        if (isDragging) {
            isDragging = false;
            previewTooltip.classList.remove('show');
            previewVideo.pause();

            const rect = progressBar.getBoundingClientRect();
            let x = (e.clientX || e.changedTouches?.[0]?.clientX || 0) - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            const percent = x / rect.width;
            const time = percent * video.duration;

            if (!isNaN(time) && video.duration) {
                video.currentTime = time;
                progressFill.style.width = percent * 100 + '%';
            }

            if (video.paused) {
                centerPlay.classList.add('show');
                showControls();
            } else {
                video.play();
                showControls();
            }
        }
    }

    // Мышь
    progressBar.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', moveDrag);
    document.addEventListener('mouseup', endDrag);

    // Тач
    progressBar.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startDrag(e);
    });
    document.addEventListener('touchmove', (e) => {
        if (isDragging) {
            e.preventDefault();
            moveDrag(e);
        }
    }, { passive: false });
    document.addEventListener('touchend', (e) => {
        if (isDragging) {
            endDrag(e);
        }
    });

    // === СОБЫТИЯ ===
    wrapper.addEventListener('click', (e) => {
        if (e.target.closest('button') || e.target.closest('.center-play') || 
            e.target.closest('.speed-dropdown') || e.target.closest('.timeline-dropdown')) {
            return;
        }
        toggleControls();
    });

    wrapper.addEventListener('mouseenter', () => {
        showControls();
    });

    wrapper.addEventListener('mouseleave', () => {
        if (!video.paused && !isDragging) {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused && !isDragging) {
                    hideControls();
                }
            }, 2000);
        }
    });

    playPauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay();
        showControls();
    });

    centerPlay.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay();
        showControls();
    });

    video.addEventListener('ended', () => {
        playIcon.setAttribute('d', 'M5,3 L19,12 L5,21 Z');
        centerPlay.classList.add('show');
        showControls();
    });

    // === ВРЕМЯ ===
    video.addEventListener('timeupdate', () => {
        const current = formatTime(video.currentTime);
        const total = formatTime(video.duration);
        timeDisplay.textContent = `${current} / ${total}`;

        if (video.duration && !isDragging) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = percent + '%';
        }
    });

    function formatTime(seconds) {
        if (isNaN(seconds)) return '00:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // === ТАЙМКОДЫ ===
    timelineBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        timelineMenu.classList.toggle('show');
    });

    document.addEventListener('click', () => {
        timelineMenu.classList.remove('show');
        speedMenu.classList.remove('show');
    });

    timelineMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const time = parseFloat(btn.dataset.time);
            if (!isNaN(time) && video.duration) {
                video.currentTime = time;
                progressFill.style.width = (time / video.duration) * 100 + '%';
                showControls();
                if (video.paused) {
                    centerPlay.classList.add('show');
                }
            }
            timelineMenu.classList.remove('show');
        });
    });

    // === СКОРОСТЬ ===
    speedBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        speedMenu.classList.toggle('show');
    });

    speedMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const speed = parseFloat(btn.dataset.speed);
            video.playbackRate = speed;
            speedBtn.textContent = speed + 'x';

            speedMenu.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            speedMenu.classList.remove('show');
            showControls();
        });
    });

    // === FULLSCREEN ===
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            if (playerContainer.requestFullscreen) {
                playerContainer.requestFullscreen();
            } else if (playerContainer.webkitRequestFullscreen) {
                playerContainer.webkitRequestFullscreen();
            } else if (playerContainer.msRequestFullscreen) {
                playerContainer.msRequestFullscreen();
            }
            try {
                screen.orientation?.lock('landscape');
            } catch(e) {}
            fsIcon.setAttribute('d', 'M5,16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6,11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z');
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            try {
                screen.orientation?.unlock();
            } catch(e) {}
            fsIcon.setAttribute('d', 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
        }
        showControls();
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            videoInfo.style.display = 'block';
            fsIcon.setAttribute('d', 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
        } else {
            videoInfo.style.display = 'none';
        }
        showControls();
    });

    fullscreenBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullscreen();
    });

    closeFsBtn.addEventListener('click', () => {
        if (document.fullscreenElement) {
            toggleFullscreen();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.fullscreenElement) {
            toggleFullscreen();
        }
    });

    setTimeout(() => {
        showControls();
    }, 500);
</script>

</body>
</html>
