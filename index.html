<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Агрегатор медиа</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: monospace; padding: 20px; }
        .video-item { border: 1px solid #333; padding: 10px; margin: 10px 0; }
        video { max-width: 100%; }
    </style>
</head>
<body>
    <h1>Сборник материалов</h1>
    <div id="output"></div>

    <script>
        // Замените URL на целевой домен
        const TARGET_URL = 'https://sex-studentki.cafe/video/lezhit-i-ne-podozrevaet-no-tut-uzhe-seks-nazrevaet-smotri-do-konca-253269';

        async function fetchAndParse() {
            try {
                // Используем публичный CORS-прокси для обхода блокировок
                const proxy = 'https://corsproxy.io/?url=';
                const response = await fetch(proxy + encodeURIComponent(TARGET_URL));
                const html = await response.text();

                // Парсим через DOMParser
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Ищем все video-теги или ссылки на MP4 (адаптируйте селектор)
                const videoElements = doc.querySelectorAll('video source, a[href$=".mp4"], video');
                const videoUrls = [];

                videoElements.forEach(el => {
                    let src = el.getAttribute('src') || el.getAttribute('href');
                    if (src && src.startsWith('//')) src = 'https:' + src;
                    if (src && !src.startsWith('http')) src = new URL(src, TARGET_URL).href;
                    if (src && src.includes('.mp4')) videoUrls.push(src);
                });

                // Уникальные ссылки
                const unique = [...new Set(videoUrls)];
                renderVideos(unique);
            } catch (e) {
                document.getElementById('output').innerHTML = 'Ошибка: ' + e.message;
            }
        }

        function renderVideos(urls) {
            const container = document.getElementById('output');
            container.innerHTML = urls.map(url => `
                <div class="video-item">
                    <video controls preload="metadata">
                        <source src="${url}" type="video/mp4">
                    </video>
                    <p>Источник: ${url}</p>
                </div>
            `).join('');
        }

        // Запуск
        fetchAndParse();
    </script>
</body>
</html>
