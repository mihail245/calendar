<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubPremium - Реальные Видео</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ff9900;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .logo span {
            background-color: #ff9900;
            color: #000000;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .video-card {
            background-color: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .video-stats {
            font-size: 12px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hub<span>PREMIUM</span></div>
    </header>

    <div class="container">
        <div class="video-grid">
            
            <!-- Плеер 1 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <!-- Вставлен рабочий стрим-поток с токеном авторизации -->
                    <video controls preload="metadata">
                        <source src="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105" type="video/mp4">
                    </video>
                </div>
                <div class="video-info">
                    <div class="video-title">Кайф подруга парнем поделилась сиксом нереално насладилась</div>
                    <div class="video-stats">Потоковое видео · Исходник cs4.vps-vids.com</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
