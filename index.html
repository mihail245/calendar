<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кастомный плеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .player-container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        /* Прогресс-бар */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 12px 0;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #ff9900;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        /* Нижняя панель управления */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
            padding: 8px 4px;
        }

        /* Кнопка Play/Pause */
        .controls button.play-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.2s;
            width: 36px;
            text-align: center;
        }
        .controls button.play-btn:hover {
            color: #ff9900;
        }

        /* Время */
        .time-display {
            color: #aaa;
            font-size: 14px;
            font-family: monospace;
            min-width: 50px;
        }

        /* Дропдаун скорости */
        .speed-dropdown {
            position: relative;
            display: inline-block;
            margin-left: auto;
        }
        .speed-dropdown .speed-btn {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            min-width: 52px;
            text-align: center;
        }
        .speed-dropdown .speed-btn:hover {
            border-color: #ff9900;
            color: #ff9900;
        }

        .speed-dropdown .dropdown-content {
            display: none;
            position: absolute;
            bottom: 110%;
            right: 0;
            background: #2a2a2a;
            border-radius: 6px;
            min-width: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 10;
        }
        .speed-dropdown .dropdown-content.show {
            display: block;
        }
        .speed-dropdown .dropdown-content button {
            display: block;
            width: 100%;
            padding: 8px 14px;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: 0.15s;
        }
        .speed-dropdown .dropdown-content button:hover {
            background: #ff9900;
            color: #000;
        }
        .speed-dropdown .dropdown-content button.active {
            background: #ff9900;
            color: #000;
            font-weight: bold;
        }

        /* Кнопка Fullscreen */
        .controls button.fs-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.2s;
        }
        .controls button.fs-btn:hover {
            color: #ff9900;
        }

        @media (max-width: 500px) {
            .controls {
                flex-wrap: wrap;
                gap: 8px;
            }
            .time-display {
                font-size: 12px;
                min-width: 40px;
            }
            .speed-dropdown .speed-btn {
                font-size: 12px;
                padding: 3px 10px;
                min-width: 44px;
            }
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="video-wrapper">
        <video id="myVideo" preload="metadata">
            <source src="https://cs4.vps-vids.com/vids738930/sexstud27873.mp4?hash=209a80d41d94eff5a0889a93e3c674ba&expires=1783631009&ip=77.220.50.105" type="video/mp4">
        </video>
    </div>

    <!-- Прогресс-бар -->
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Управление -->
    <div class="controls">
        <!-- Play / Pause -->
        <button class="play-btn" id="playPauseBtn">▶</button>

        <!-- Время -->
        <span class="time-display" id="timeDisplay">00:00</span>

        <!-- Дропдаун скорости -->
        <div class="speed-dropdown">
            <button class="speed-btn" id="speedBtn">1x</button>
            <div class="dropdown-content" id="speedMenu">
                <button data-speed="0.5">0.5x</button>
                <button data-speed="0.75">0.75x</button>
                <button data-speed="1" class="active">1x</button>
                <button data-speed="1.25">1.25x</button>
            </div>
        </div>

        <!-- Fullscreen -->
        <button class="fs-btn" id="fullscreenBtn">⛶</button>
    </div>
</div>

<script>
    const video = document.getElementById('myVideo');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const speedBtn = document.getElementById('speedBtn');
    const speedMenu = document.getElementById('speedMenu');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    // === Play / Pause ===
    playPauseBtn.addEventListener('click', () => {
        if (video.paused) {
            video.play();
            playPauseBtn.textContent = '⏸';
        } else {
            video.pause();
            playPauseBtn.textContent = '▶';
        }
    });

    video.addEventListener('click', () => {
        if (video.paused) {
            video.play();
            playPauseBtn.textContent = '⏸';
        } else {
            video.pause();
            playPauseBtn.textContent = '▶';
        }
    });

    video.addEventListener('ended', () => {
        playPauseBtn.textContent = '▶';
    });

    // === Время и прогресс ===
    video.addEventListener('timeupdate', () => {
        timeDisplay.textContent = formatTime(video.currentTime);
        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = percent + '%';
        }
    });

    // Клик по прогресс-бару
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / rect.width;
        video.currentTime = clickX * video.duration;
    });

    function formatTime(seconds) {
        if (isNaN(seconds)) return '00:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // === Дропдаун скорости ===
    speedBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        speedMenu.classList.toggle('show');
    });

    // Клик вне дропдауна — закрываем
    document.addEventListener('click', () => {
        speedMenu.classList.remove('show');
    });

    // Выбор скорости
    speedMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const speed = parseFloat(btn.dataset.speed);
            video.playbackRate = speed;
            speedBtn.textContent = speed + 'x';

            // Активная кнопка
            speedMenu.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            speedMenu.classList.remove('show');
        });
    });

    // === Fullscreen ===
    fullscreenBtn.addEventListener('click', () => {
        const container = document.querySelector('.player-container');
        if (!document.fullscreenElement) {
            container.requestFullscreen?.() || container.webkitRequestFullscreen?.();
        } else {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }
    });

    // При выходе из fullscreen сбрасываем
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            // можно добавить логику
        }
    });
</script>

</body>
</html>
