<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парсер видео</title>
</head>
<body>
    <h3>Извлечение видео с указанной страницы</h3>
    <div id="result">Загрузка...</div>

    <script>
        const targetUrl = 'https://sex-studentki.cafe/bro-sis';
        const proxy = 'https://api.allorigins.win/raw?url=';

        async function parseVideo() {
            try {
                const response = await fetch(proxy + encodeURIComponent(targetUrl));
                const html = await response.text();

                // Парсим через DOMParser
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Ищем все возможные источники видео
                const sources = new Set();

                // 1. Теги video / source
                doc.querySelectorAll('video source, video').forEach(el => {
                    let src = el.getAttribute('src') || el.getAttribute('data-src');
                    if (src) sources.add(src);
                });

                // 2. Ссылки на .mp4, .m3u8, .ts
                doc.querySelectorAll('a[href*=".mp4"], a[href*=".m3u8"], a[href*=".ts"]').forEach(el => {
                    let href = el.getAttribute('href');
                    if (href) sources.add(href);
                });

                // 3. iframe (возможно, видео встроено)
                doc.querySelectorAll('iframe').forEach(el => {
                    let src = el.getAttribute('src');
                    if (src) sources.add(src);
                });

                // 4. data-атрибуты (популярные плееры)
                doc.querySelectorAll('[data-video], [data-src], [data-file]').forEach(el => {
                    let val = el.getAttribute('data-video') || el.getAttribute('data-src') || el.getAttribute('data-file');
                    if (val) sources.add(val);
                });

                // Приводим ссылки к абсолютному виду
                const baseUrl = new URL(targetUrl);
                const absoluteUrls = [...sources].map(src => {
                    try {
                        return new URL(src, baseUrl).href;
                    } catch {
                        return src;
                    }
                }).filter(src => src.includes('.mp4') || src.includes('.m3u8') || src.includes('video') || src.includes('embed'));

                // Выводим результат
                const container = document.getElementById('result');
                if (absoluteUrls.length === 0) {
                    container.innerHTML = 'Видео не найдены. Попробуйте обновить селекторы или проверьте структуру страницы.';
                    return;
                }

                container.innerHTML = '<h4>Найденные ссылки:</h4>' + 
                    absoluteUrls.map((url, i) => 
                        `<div style="margin:5px 0;">
                            <a href="${url}" target="_blank">Ссылка ${i+1}</a> 
                            <video controls width="400" style="display:block; margin-top:5px;">
                                <source src="${url}" type="video/mp4">
                            </video>
                        </div>`
                    ).join('');

            } catch (error) {
                document.getElementById('result').innerHTML = 'Ошибка: ' + error.message;
            }
        }

        parseVideo();
    </script>
</body>
</html>
